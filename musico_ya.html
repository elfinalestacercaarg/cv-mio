<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Músico Ya - Marketplace de Músicos Entre Ríos</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(139, 69, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0, 200, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            padding: 30px 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 3rem;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(139, 69, 255, 0.3);
        }

        .tagline {
            color: #a0aec0;
            font-size: 1.1rem;
        }

        /* Main section */
        main {
            padding: 60px 0;
        }

        .form-container {
            background: rgba(15, 52, 96, 0.7);
            border: 1px solid rgba(139, 69, 255, 0.3);
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: #a0aec0;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            position: relative;
            bottom: -1px;
        }

        .tab-btn.active {
            color: #fff;
            border-bottom-color: #00c8ff;
        }

        .tab-btn:hover {
            color: #e0e0e0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #e0e0e0;
            font-weight: 500;
            font-family: 'Syne', sans-serif;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(139, 69, 255, 0.5);
            border-radius: 8px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input::placeholder, textarea::placeholder {
            color: #7a8aa0;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: #00c8ff;
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8b45ff 0%, #00c8ff 100%);
            border: none;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 69, 255, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.5);
        }

        .message.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.5);
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            text-align: center;
            padding: 30px 0;
            color: #7a8aa0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 60px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #00c8ff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            color: #8b45ff;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .form-container {
                padding: 20px;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .tab-btn {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 Músico Ya</h1>
            <p class="tagline">Conecta con músicos profesionales en Entre Ríos</p>
        </header>

        <main>
            <div class="form-container">
                <div id="message" class="message"></div>

                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('org')">Soy Organizador</button>
                    <button class="tab-btn" onclick="switchTab('musician')">Soy Músico</button>
                </div>

                <!-- Tab: Organizador -->
                <form id="orgForm" class="tab-content active" onsubmit="handleSubmit(event, 'Organizador')">
                    <div class="form-group">
                        <label for="org-nombre">Nombre del evento o empresa</label>
                        <input type="text" id="org-nombre" name="nombre" placeholder="Ej: Salón Las Flores" required>
                    </div>

                    <div class="form-group">
                        <label for="org-zona">Zona de Entre Ríos</label>
                        <select id="org-zona" name="zona" required>
                            <option value="">Selecciona una zona</option>
                            <option value="Chajarí">Chajarí</option>
                            <option value="Concordia">Concordia</option>
                            <option value="Gualeguaychú">Gualeguaychú</option>
                            <option value="Concepción del Uruguay">Concepción del Uruguay</option>
                            <option value="Paraná">Paraná</option>
                            <option value="Colón">Colón</option>
                            <option value="Otra">Otra</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="org-whatsapp">WhatsApp</label>
                        <input type="tel" id="org-whatsapp" name="whatsapp" placeholder="+54 9 3456 123456" required>
                    </div>

                    <div class="form-group">
                        <label for="org-tipo-musico">Tipo de músico que buscas</label>
                        <input type="text" id="org-tipo-musico" name="tipo_musico" placeholder="Ej: Banda, DJ, Guitarrista" required>
                    </div>

                    <div class="form-group">
                        <label for="org-mensaje">Detalles del evento</label>
                        <textarea id="org-mensaje" name="mensaje" placeholder="Cuéntanos más sobre tu evento..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Enviar Solicitud</button>
                </form>

                <!-- Tab: Músico -->
                <form id="musicianForm" class="tab-content" onsubmit="handleSubmit(event, 'Músico')">
                    <div class="form-group">
                        <label for="mus-nombre">Tu nombre</label>
                        <input type="text" id="mus-nombre" name="nombre" placeholder="Ej: Juan García" required>
                    </div>

                    <div class="form-group">
                        <label for="mus-zona">Zona de residencia</label>
                        <select id="mus-zona" name="zona" required>
                            <option value="">Selecciona una zona</option>
                            <option value="Chajarí">Chajarí</option>
                            <option value="Concordia">Concordia</option>
                            <option value="Gualeguaychú">Gualeguaychú</option>
                            <option value="Concepción del Uruguay">Concepción del Uruguay</option>
                            <option value="Paraná">Paraná</option>
                            <option value="Colón">Colón</option>
                            <option value="Otra">Otra</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mus-whatsapp">WhatsApp</label>
                        <input type="tel" id="mus-whatsapp" name="whatsapp" placeholder="+54 9 3456 123456" required>
                    </div>

                    <div class="form-group">
                        <label for="mus-tipo">¿Qué tipo de músico eres?</label>
                        <input type="text" id="mus-tipo" name="tipo_musico" placeholder="Ej: Guitarrista, DJ, Baterista" required>
                    </div>

                    <div class="form-group">
                        <label for="mus-mensaje">Cuéntanos sobre ti</label>
                        <textarea id="mus-mensaje" name="mensaje" placeholder="Experiencia, géneros que tocas, etc..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Registrarme</button>
                </form>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 Músico Ya. Todos los derechos reservados.</p>
            <div class="footer-links">
                <a href="#">Términos de servicio</a>
                <a href="#">Privacidad</a>
                <a href="https://wa.me/5493456461557" target="_blank">Contacto WhatsApp</a>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        // Inicializar EmailJS
        emailjs.init('OF1ib5h2kQfMytDa');

        function switchTab(tabName) {
            // Ocultar todos los tabs
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));

            // Desactivar todos los botones
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            // Activar el tab seleccionado
            if (tabName === 'org') {
                document.getElementById('orgForm').classList.add('active');
                buttons[0].classList.add('active');
            } else {
                document.getElementById('musicianForm').classList.add('active');
                buttons[1].classList.add('active');
            }
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type + ' show';

            // Auto-desaparecer después de 5 segundos
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 5000);
        }

        function handleSubmit(event, tabTipo) {
            event.preventDefault();

            const form = event.target;
            const submitBtn = form.querySelector('.submit-btn');

            // Recopilar datos del formulario
            const nombre = form.querySelector('input[name="nombre"]').value;
            const zona = form.querySelector('select[name="zona"]').value;
            const whatsapp = form.querySelector('input[name="whatsapp"]').value;
            const tipo_musico = form.querySelector('input[name="tipo_musico"]').value;
            const mensaje = form.querySelector('textarea[name="mensaje"]').value;
            const fecha = new Date().toLocaleDateString('es-AR');

            // Deshabilitar botón mientras se envía
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            submitBtn.textContent = 'Enviando...';

            // Enviar con EmailJS
            emailjs.send('service_b2t41od', 'template_6l9f17g', {
                tab_tipo: tabTipo,
                nombre: nombre,
                zona: zona,
                whatsapp: whatsapp,
                tipo_musico: tipo_musico,
                mensaje: mensaje,
                fecha: fecha,
                email: 'nahuealzogaray01@gmail.com'
            }).then(function(response) {
                console.log('Email enviado:', response.status, response.text);
                showMessage('✓ Mensaje enviado exitosamente. Te contactaremos pronto.', 'success');
                form.reset();
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                submitBtn.textContent = tabTipo === 'Organizador' ? 'Enviar Solicitud' : 'Registrarme';
            }, function(error) {
                console.log('Error al enviar:', error);
                showMessage('✗ Error al enviar. Intenta de nuevo o contacta por WhatsApp.', 'error');
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                submitBtn.textContent = tabTipo === 'Organizador' ? 'Enviar Solicitud' : 'Registrarme';
            });
        }
    </script>
</body>
</html>
